###############################################################################
# RoomEase — CI/CD Pipeline
# Triggers on push/PR to main. Builds, tests, scans, pushes Docker image,
# deploys to Render, and validates K8s manifests.
###############################################################################

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "18"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Lint, Test, Audit
  # ═══════════════════════════════════════════════════════════════════════════
  lint-and-test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high || true

      - name: Run tests
        run: npm run test:ci
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Build & Push Docker Image to GHCR
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Security Scan with Trivy
  # ═══════════════════════════════════════════════════════════════════════════
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: docker-build-push

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "0"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Validate Kubernetes Manifests
  # ═══════════════════════════════════════════════════════════════════════════
  k8s-validate:
    name: ☸️  K8s Manifest Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Validate all K8s manifests
        run: |
          echo "🔍 Validating Kubernetes manifests..."
          ERRORS=0

          # Apply namespace first (required by other manifests)
          echo "  ✔ Validating k8s/namespace.yaml"
          if ! kubectl apply --dry-run=client --validate=false -f k8s/namespace.yaml 2>&1; then
            echo "  ✘ FAILED: k8s/namespace.yaml"
            ERRORS=$((ERRORS + 1))
          fi

          # Validate remaining manifests
          for file in k8s/*.yaml; do
            [ "$file" = "k8s/namespace.yaml" ] && continue
            [ "$file" = "k8s/README.md" ] && continue
            echo "  ✔ Validating $file"
            if ! kubectl apply --dry-run=client --validate=false -f "$file" 2>&1; then
              echo "  ✘ FAILED: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS manifest(s) failed validation"
            exit 1
          fi
          echo "✅ All manifests valid"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5: Deploy to Render
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-render:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "🚀 Triggering Render deployment..."
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "✅ Deploy hook triggered"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK secret not configured. Skipping."
            echo "   Render will auto-deploy from the main branch if auto-deploy is enabled."
          fi