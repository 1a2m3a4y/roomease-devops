##############################################################################
# RoomEase — Local Development Stack
# Usage:  docker-compose up --build
#         docker-compose down -v   (to also remove volumes)
##############################################################################

services:
  # ── Node.js Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roomease-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/roomease
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - roomease-net

  # ── MongoDB (local dev only) ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: roomease-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - roomease-net

volumes:
  mongo_data:
    driver: local

networks:
  roomease-net:
    driver: bridge
