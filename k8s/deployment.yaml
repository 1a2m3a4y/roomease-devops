apiVersion: apps/v1
kind: Deployment
metadata:
  name: roomease-app
  namespace: roomease
  labels:
    app: roomease
    version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roomease
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: roomease
    spec:
      # ── Pod anti-affinity: spread replicas across nodes ──────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["roomease"]
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      containers:
        - name: roomease
          # ⚠️  Replace with your actual image, e.g.:
          #   ghcr.io/your-username/devsecops_project:latest
          image: ghcr.io/your-username/devsecops_project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP

          # ── Environment variables ──────────────────────────────────────
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: roomease-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: roomease-config
                  key: NODE_ENV
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: roomease-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX
              valueFrom:
                configMapKeyRef:
                  name: roomease-config
                  key: RATE_LIMIT_MAX
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: roomease-secret
                  key: MONGO_URI

          # ── Resource limits ────────────────────────────────────────────
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          # ── Security context (container level) ─────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          # ── Probes ─────────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
