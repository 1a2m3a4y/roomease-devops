apiVersion: v1
kind: Secret
metadata:
  name: roomease-secret
  namespace: roomease
  labels:
    app: roomease
type: Opaque
# Replace the placeholder with your actual MongoDB connection string.
# stringData accepts plain text — Kubernetes encodes it automatically.
stringData:
  MONGO_URI: "mongodb+srv://user:password@cluster.mongodb.net/roomease"

