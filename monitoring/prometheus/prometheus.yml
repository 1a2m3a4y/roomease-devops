global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # RoomEase Node.js app
  - job_name: "roomease"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:3000"]
        labels:
          environment: "development"
          service: "roomease-backend"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
